<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Color Converter — DevKit Tools</title><meta name="description" content="在线颜色Convert器 - HEX/RGB/HSL/HSV 互转，色板Preview"><style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column}
header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:18px;font-weight:700;color:#58a6ff}.logo span{color:#f0c040}
header .badge{font-size:10px;background:#daa520;color:#fff;padding:2px 8px;border-radius:10px;margin-left:8px}
main{max-width:700px;margin:0 auto;padding:32px 24px;flex:1}
.tool-wrapper{padding:20px 0}
footer{padding:16px 24px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#484f58}
footer a{color:#58a6ff;text-decoration:none;margin:0 8px}
.btn-primary:hover{background:#2ea043!important}.btn:hover{background:#30363d!important}
input:focus,textarea:focus,select:focus{outline:none;border-color:#58a6ff!important}
.btn{font-family:inherit}</style></head><body><header><div class="logo">🛠 <span>Dev</span>Kit<span class="badge">BETA</span></div><div style="font-size:11px;color:#8b949e">🔒 Processed locally · 数据不Upload</div></header><main><h1 style="font-size:24px;margin-bottom:4px">Color Converter</h1><p style="color:#8b949e;font-size:14px;margin-bottom:8px">在线颜色Convert器 - HEX/RGB/HSL/HSV 互转，色板Preview</p><div class="tool-wrapper"><div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap"><input type="color" id="color-pick" value="#58a6ff" style="width:80px;height:80px;border-radius:12px;border:2px solid #30363d;cursor:pointer;padding:0"><div style="flex:1;min-width:200px"><div class="field" style="margin-bottom:8px"><input id="hex-in" value="#58A6FF" style="width:100%;padding:10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:14px;font-family:mono" oninput="hexChanged()"></div><div class="field" style="margin-bottom:8px"><input id="rgb-in" value="rgb(88, 166, 255)" style="width:100%;padding:10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:14px;font-family:mono" oninput="rgbChanged()"></div><div class="field"><input id="hsl-in" value="hsl(212, 100%, 67%)" style="width:100%;padding:10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:14px;font-family:mono" oninput="hslChanged()"></div></div></div><div style="display:flex;gap:8px"><button class="btn btn-primary" style="padding:8px 16px;background:#238636;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600" onclick="copyAll()">📋 Copy全部</button></div></div></main><footer><a href="https://github.com/479464887-rgb/color-converter">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer><script>let c={r:88,g:166,b:255,h:212,s:100,l:67};
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const M=Math.max(r,g,b),m=Math.min(r,g,b),d=M-m;let h=0,s,l=(M+m)/2;if(d){s=l>0.5?d/(2-M-m):d/(M+m);switch(M){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)}}
function hslToRgb(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l),f=n=>{const k=(n+h/30)%12,c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c)};return{r:f(0),g:f(8),b:f(4)}}
function sync(v,t){if(t==='hex'){v=v.replace('#','');c.r=parseInt(v.substring(0,2),16);c.g=parseInt(v.substring(2,4),16);c.b=parseInt(v.substring(4,6),16)}else if(t==='rgb'){const m=v.match(/\d+/g);if(m&&m.length>=3){c.r=parseInt(m[0]);c.g=parseInt(m[1]);c.b=parseInt(m[2])}}else if(t==='hsl'){const m=v.match(/\d+/g);if(m&&m.length>=3){c.h=parseInt(m[0]);c.s=parseInt(m[1]);c.l=parseInt(m[2]);const r=hslToRgb(c.h,c.s,c.l);c.r=r.r;c.g=r.g;c.b=r.b}}else{c=rgbToHsl(c.r,c.g,c.b)}const ho=rgbToHsl(c.r,c.g,c.b);c.h=ho.h;c.s=ho.s;c.l=ho.l;const hex='#'+[c.r,c.g,c.b].map(x=>Math.max(0,Math.min(255,x)).toString(16).padStart(2,'0')).join('').toUpperCase();document.getElementById('hex-in').value=hex;document.getElementById('rgb-in').value=`rgb(${c.r}, ${c.g}, ${c.b})`;document.getElementById('hsl-in').value=`hsl(${c.h}, ${c.s}%, ${c.l}%)`;document.getElementById('color-pick').value=hex.toLowerCase()}
function hexChanged(){sync(document.getElementById('hex-in').value,'hex')}
function rgbChanged(){sync(document.getElementById('rgb-in').value,'rgb')}
function hslChanged(){sync(document.getElementById('hsl-in').value,'hsl')}
document.getElementById('color-pick').addEventListener('input',function(){sync(this.value,'hex')});
function copyAll(){navigator.clipboard.writeText('HEX: '+document.getElementById('hex-in').value+'\nRGB: '+document.getElementById('rgb-in').value+'\nHSL: '+document.getElementById('hsl-in').value)}
</script></body></html>
